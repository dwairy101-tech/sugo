<style id="sugo-opening-critical-css">
/* ===== id="sugo-opening-critical-css" ===== */

/* Critical opening splash: loaded in <head> so the effect appears before the page UI. */
html.sugo-booting, html.sugo-booting body{
  background:#050505!important;
}
html.sugo-booting body{
  overflow:hidden!important;
}
.sugo-opening-splash{
  position:fixed!important;
  inset:0!important;
  z-index:999999!important;
  display:grid!important;
  place-items:center!important;
  background:radial-gradient(circle at 28% 10%,rgba(153,27,27,.32),transparent 34%),linear-gradient(145deg,#050505,#111113 54%,#1d0808)!important;
  opacity:1!important;
  visibility:visible!important;
  transition:opacity .42s ease,visibility .42s ease!important;
}
.sugo-opening-splash.sugo-hide{
  opacity:0!important;
  visibility:hidden!important;
  pointer-events:none!important;
}
.sugo-opening-card{
  width:min(86vw,360px)!important;
  padding:28px 24px!important;
  border-radius:26px!important;
  text-align:center!important;
  color:#fff!important;
  background:rgba(255,255,255,.055)!important;
  border:1px solid rgba(255,255,255,.12)!important;
  box-shadow:0 28px 90px rgba(0,0,0,.42)!important;
  backdrop-filter:blur(10px)!important;
  overflow:hidden!important;
  position:relative!important;
}
.sugo-opening-card:before{
  content:'';
  position:absolute;
  inset:-70px;
  background:conic-gradient(from 0deg,transparent,rgba(153,27,27,.65),transparent 35%);
  animation:sugoOpeningSpin 1.35s linear infinite;
}
.sugo-opening-card>*{position:relative;z-index:1}
.sugo-opening-logo{
  width:72px;height:72px;margin:0 auto 13px;border-radius:22px;
  display:grid;place-items:center;
  background:linear-gradient(135deg,#991b1b,#111);
  font-family:'Cairo','Plus Jakarta Sans',system-ui,sans-serif;
  font-size:2rem;font-weight:900;
  box-shadow:0 18px 45px rgba(153,27,27,.35);
}
.sugo-opening-title{font-family:'Cairo','Plus Jakarta Sans',system-ui,sans-serif;font-weight:900;font-size:1.38rem;letter-spacing:.04em}
.sugo-opening-subtitle{margin-top:3px;color:#d4d4d8;font-size:.78rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase}
.sugo-opening-bar{height:5px;margin:18px auto 0;border-radius:999px;background:rgba(255,255,255,.13);overflow:hidden}
.sugo-opening-bar span{display:block;height:100%;width:44%;border-radius:inherit;background:linear-gradient(90deg,#fff,#ef4444);animation:sugoOpeningLoad 1.05s ease-in-out infinite}
@keyframes sugoOpeningSpin{to{transform:rotate(360deg)}}
@keyframes sugoOpeningLoad{0%{transform:translateX(-125%)}100%{transform:translateX(235%)}}
</style>
<link id="sugo-app-css" rel="stylesheet" href="./assets/sugo-app.css">

<script id="sugo-critical-js">
// ===== id="sugo-opening-critical-js" =====

/* Mark booting before the body is painted, then release only after splash hides. */
document.documentElement.classList.add('sugo-booting');

// ===== id="sugo-options-default-closed-head" =====

/* Ensure OPTIONS is closed on every fresh file open, regardless of a previous browser session. */
try { localStorage.removeItem('sugo_options_open'); localStorage.removeItem('sugo_last_pane'); localStorage.removeItem('sugo_nav_state_v2'); } catch (e) {}
</script>
