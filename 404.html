<!doctype html>
<html lang="en" dir="ltr" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#080809">
  <meta name="robots" content="noindex">
  <meta name="referrer" content="no-referrer">
  <title>Redirecting — SUGO SOP</title>
  <script>
    (() => {
      const isProjectPages = location.hostname.endsWith(".github.io");
      const segments = location.pathname.split("/").filter(Boolean);
      const base = isProjectPages && segments.length ? `/${segments[0]}/` : "/";
      location.replace(`${base}${location.search}${location.hash}`);
    })();
  </script>
</head>
<body>
  <p>Redirecting to the SUGO SOP portal…</p>
</body>
</html>
