name = "sugo-sop-worker"
main = "worker.js"
compatibility_date = "2026-07-10"

[[kv_namespaces]]
binding = "SUGO_KV"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

# Configure secrets from this directory; never commit secret values:
#   npx wrangler secret put ADMIN_PASSWORD
#   npx wrangler secret put GEMINI_API_KEY
#   npx wrangler secret put CEREBRAS_API_KEY
#   npx wrangler secret put GROK_API_KEY
#
# At least one AI provider key is required. The unchanged Worker also accepts:
# - Gemini: GEMINI_KEY, GEMINI_KEY_1...50, GEMINI_API_KEY_1...50
# - Cerebras: CEREBRAS_KEY, CEREBRAS_KEY_1...50, CEREBRAS_API_KEY_1...50
# - Grok/xAI: XAI_API_KEY, GROK_KEY, XAI_KEY, and numbered variants
#
# Optional non-secret variables may be configured in Cloudflare or under [vars]:
# GEMINI_MODEL, CEREBRAS_MODEL, GROK_MODEL, CORS_ORIGIN, CACHE_TTL_SECONDS,
# DEBUG_ERRORS, LOG_REQUESTS, STRICT_ACCURACY_GATE, MAX_MESSAGES,
# MAX_INPUT_CHARS, MAX_IMAGES_PER_REQUEST, MAX_IMAGE_BASE64_CHARS,
# PROVIDER_TIMEOUT_MS, RATE_LIMIT_PER_MINUTE, RATE_LIMIT_WINDOW_SECONDS.
