name = "sugo-sop-worker"
main = "worker.js"
compatibility_date = "2026-07-09"

# Replace this placeholder with the real Cloudflare KV namespace ID before deploy.
[[kv_namespaces]]
binding = "SUGO_KV"
id = "REPLACE_WITH_SUGO_KV_NAMESPACE_ID"

# Required secrets / environment values are set with:
# wrangler secret put GEMINI_API_KEY
# wrangler secret put CEREBRAS_API_KEY
# wrangler secret put GROK_API_KEY
# wrangler secret put ADMIN_PASSWORD
# Optional model override secrets may be added if used by the existing worker.js.
